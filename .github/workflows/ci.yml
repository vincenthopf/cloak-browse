name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install ${{ matrix.python }}

      - name: Install
        run: uv sync --python ${{ matrix.python }}

      - name: Verify CLI entrypoint
        run: uv run cloak-browse --help

      - name: Verify imports
        run: |
          uv run python -c "from cloak_browse.cli import main; print('cli: ok')"
          uv run python -c "from cloakbrowser import launch; print('cloakbrowser: ok')"
          uv run python -c "from browser_harness import helpers; print('browser-harness: ok')"

      - name: Verify stealth binary download
        run: |
          uv run python -c "
          from cloakbrowser.download import ensure_binary
          path = ensure_binary()
          print(f'binary: {path}')
          assert path, 'binary download failed'
          "
